name: PR Validation

# Automation approval: manual-only 2026-05-30 by Travis J. Neuman.
# Purpose: manually run PR-style lint, compile, and curriculum contract checks.
# Quota impact: GitHub Actions minutes only when manually dispatched.
# Writes/deploys: validation only; does not commit repository changes.
# Registry: E:/Web Development/_meta.notes/Projects/.webdev/Automation Approval Registry - 2026-05-30.md
# Manual-only in the canonical repo to avoid automatic free-tier usage; forks may enable their own triggers intentionally.

on:
  workflow_dispatch:

jobs:
  validate:
    name: Lint, Compile & Contract Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ruff pytest

      - name: Ruff lint check
        run: ruff check .

      - name: Python syntax check (py_compile)
        run: |
          python -c "
          import pathlib, py_compile, sys
          errors = []
          for p in pathlib.Path('.').rglob('*.py'):
              if '.venv' in p.parts:
                  continue
              try:
                  py_compile.compile(str(p), doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(str(e))
          if errors:
              print(f'Syntax errors in {len(errors)} file(s):')
              for err in errors:
                  print(f'  {err}')
              sys.exit(1)
          print('All Python files compile successfully.')
          "

      - name: Root doc contract checks
        run: python tools/check_root_docs.py

      - name: Level index contract checks
        run: python tools/check_level_index_contract.py

      - name: Elite track contract checks
        run: python tools/check_elite_track_contract.py

      - name: Modality hub link validation
        run: python tools/check_modality_hubs.py
